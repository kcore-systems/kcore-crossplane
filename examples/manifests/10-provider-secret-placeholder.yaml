# Replace with a Secret that holds mTLS material for the kcore controller:
#   ca.crt, tls.crt, tls.key (PEM). For plaintext dev endpoints, use ProviderConfig with
#   insecure: true and credentials source None (see 20-providerconfig-insecure.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: kcore-controller-tls
  namespace: kcore-provider
type: Opaque
stringData:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_ME
    -----END CERTIFICATE-----
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_ME
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----
